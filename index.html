<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>最強通知待機中</title>
    <style>
        body { text-align: center; padding-top: 50px; font-family: sans-serif; }
        .btn { padding: 30px; font-size: 24px; border-radius: 15px; border: none; cursor: pointer; width: 85%; background: #ff4757; color: white; font-weight: bold; }
        #status { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🚨 本格通知システム</h1>
    <button class="btn" onclick="toggleEmergency(true)">通知を全員に送る！</button>
    <div id="status">通知の許可を確認中...</div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://game-server-df061-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. 通知の許可をもらう
        if ("Notification" in window) {
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    document.getElementById('status').innerText = "✅ 通知許可済み！別サイトOK";
                    // ServiceWorkerの登録（通知に必須）
                    navigator.serviceWorker.register('sw.js');
                } else {
                    document.getElementById('status').innerText = "❌ 通知がブロックされています";
                }
            });
        }

        // 2. Firebaseを監視してバナー通知を出す
        db.ref('emergency_mode').on('value', (snap) => {
            if (snap.val() === true) {
                showNotification();
            }
        });

        function showNotification() {
            if (Notification.permission === "granted") {
                // ここがバナー通知の本体
                const n = new Notification("🚨 呼び出し中！", {
                    body: "至急、チャットを確認してください！",
                    tag: "emergency", // 何度も同じ通知が重ならないように
                    renotify: true,
                    silent: false // 音も鳴らす（設定による）
                });
            }
        }

        async function toggleEmergency(active) {
            await db.ref('emergency_mode').set(active);
            // 3秒後に自動でOFFにする（そうしないと通知が出しっぱなしになるため）
            setTimeout(() => db.ref('emergency_mode').set(false), 3000);
        }
    </script>
</body>
</html>
